<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teams Chat Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary: #ffffff; --bg-secondary: #f5f5f5; --bg-tertiary: #ebebeb;
      --bg-info: #e6f1fb; --bg-success: #eaf3de; --bg-warning: #faeeda;
      --text-primary: #1a1a1a; --text-secondary: #555; --text-tertiary: #999;
      --text-info: #185fa5; --text-success: #3b6d11; --text-warning: #854f0b;
      --border: rgba(0,0,0,0.12); --border-hover: rgba(0,0,0,0.25);
      --border-info: rgba(24,95,165,0.4); --radius-md: 8px; --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1e1e1e; --bg-secondary: #272727; --bg-tertiary: #2f2f2f;
        --bg-info: #0c2a45; --bg-success: #172d08; --bg-warning: #2e1a04;
        --text-primary: #e8e8e8; --text-secondary: #aaa; --text-tertiary: #666;
        --text-info: #85b7eb; --text-success: #97c459; --text-warning: #ef9f27;
        --border: rgba(255,255,255,0.1); --border-hover: rgba(255,255,255,0.22);
        --border-info: rgba(133,183,235,0.35);
      }
    }
    html, body { height: 100%; background: var(--bg-tertiary); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--text-primary); }
    #app { display: flex; flex-direction: column; height: 100vh; background: var(--bg-primary); }
    .topbar { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 0.5px solid var(--border); background: var(--bg-primary); flex-shrink: 0; flex-wrap: wrap; }
    .topbar-title { font-size: 15px; font-weight: 600; }
    .topbar-title span { color: var(--text-info); }
    .search-wrap { position: relative; flex: 1; min-width: 160px; max-width: 340px; }
    .search-wrap input { width: 100%; padding: 6px 10px 6px 32px; font-size: 13px; border: 0.5px solid var(--border-hover); border-radius: var(--radius-md); background: var(--bg-secondary); color: var(--text-primary); outline: none; }
    .search-wrap input:focus { border-color: var(--border-info); }
    .search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--text-tertiary); pointer-events: none; }
    .main { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 260px; min-width: 160px; border-right: 0.5px solid var(--border); display: flex; flex-direction: column; overflow: hidden; background: var(--bg-secondary); }
    .sidebar-header { padding: 12px 14px 8px; font-size: 11px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .07em; flex-shrink: 0; }
    .thread-list { flex: 1; overflow-y: auto; }
    .thread-item { padding: 10px 14px; cursor: pointer; border-bottom: 0.5px solid var(--border); transition: background .1s; }
    .thread-item:hover { background: var(--bg-primary); }
    .thread-item.active { background: var(--bg-info); border-left: 2px solid var(--text-info); }
    .thread-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .thread-item.active .thread-name { color: var(--text-info); }
    .thread-meta { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
    .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-primary); }
    .chat-header { padding: 12px 20px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .chat-header-name { font-size: 15px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chat-header-count { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
    .stats-bar { padding: 6px 20px; background: var(--bg-secondary); border-bottom: 0.5px solid var(--border); font-size: 11px; color: var(--text-secondary); display: flex; gap: 16px; flex-shrink: 0; flex-wrap: wrap; }
    .stats-bar b { color: var(--text-primary); }
    .messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 2px; }
    .msg-group { display: flex; gap: 10px; margin-bottom: 14px; align-items: flex-start; }
    .avatar { width: 32px; height: 32px; min-width: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }
    .avatar-info { background: var(--bg-info); color: var(--text-info); }
    .avatar-success { background: var(--bg-success); color: var(--text-success); }
    .avatar-warning { background: var(--bg-warning); color: var(--text-warning); }
    .msg-content { flex: 1; min-width: 0; }
    .msg-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 3px; }
    .msg-sender { font-size: 13px; font-weight: 600; }
    .msg-time { font-size: 11px; color: var(--text-tertiary); }
    .msg-body { font-size: 13px; line-height: 1.65; color: var(--text-primary); word-break: break-word; white-space: pre-wrap; }
    .msg-body mark { background: var(--bg-warning); color: var(--text-warning); border-radius: 2px; padding: 0 1px; }
    .upload-zone { border: 1.5px dashed var(--border-hover); border-radius: var(--radius-lg); padding: 48px 32px; text-align: center; cursor: pointer; margin: auto; width: 100%; max-width: 440px; transition: all .2s; }
    .upload-zone:hover, .upload-zone.over { border-color: var(--border-info); background: var(--bg-info); }
    .upload-zone .icon { font-size: 36px; margin-bottom: 10px; }
    .upload-zone h2 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .upload-zone p { font-size: 13px; color: var(--text-secondary); line-height: 1.7; }
    .upload-link { color: var(--text-info); cursor: pointer; font-weight: 500; }
    .upload-link:hover { text-decoration: underline; }
    .empty-wrap { display: flex; align-items: center; justify-content: center; height: 100%; padding: 20px; }
    .btn { font-size: 12px; padding: 5px 12px; border: 0.5px solid var(--border-hover); border-radius: var(--radius-md); cursor: pointer; background: var(--bg-secondary); color: var(--text-primary); transition: background .1s; white-space: nowrap; }
    .btn:hover { background: var(--bg-tertiary); }
    .badge { display: inline-flex; align-items: center; justify-content: center; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 9px; font-size: 10px; background: var(--bg-info); color: var(--text-info); font-weight: 600; }
    .no-results { padding: 20px; font-size: 13px; color: var(--text-secondary); }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 3px; }
  </style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="topbar-title">Teams <span>Chat Viewer</span></div>
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input id="searchInput" type="text" placeholder="Search messages..." oninput="handleSearch(this.value)">
    </div>
    <button class="btn" onclick="exportData('csv')">Export CSV</button>
    <button class="btn" onclick="exportData('json')">Export JSON</button>
    <button class="btn" onclick="document.getElementById('fileInput').click()">&#43; Add EML</button>
    <input id="fileInput" type="file" multiple accept=".eml,.txt" style="display:none" onchange="handleFiles(this.files)">
  </div>
  <div class="main">
    <div class="sidebar">
      <div class="sidebar-header">Conversations</div>
      <div class="thread-list" id="threadList">
        <div style="padding:16px 14px;font-size:12px;color:var(--text-tertiary)">No files loaded yet</div>
      </div>
    </div>
    <div class="chat-area" id="chatArea">
      <div class="empty-wrap" id="emptyState">
        <div class="upload-zone" id="dropZone"
          ondragover="event.preventDefault();this.classList.add('over')"
          ondragleave="this.classList.remove('over')"
          ondrop="this.classList.remove('over');handleFiles(event.dataTransfer.files)">
          <div class="icon">&#128442;</div>
          <h2>Drop your EML files here</h2>
          <p>Drag &amp; drop eDiscovery exported EML files,<br>or <span class="upload-link" onclick="document.getElementById('fileInput').click()">browse to upload</span>.<br><br>
          All processing is done locally in your browser.<br>No data is sent anywhere.</p>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
var allMessages=[];var threads={};var activeThread=null;var searchQuery='';
var avatarClasses=['info','success','warning'];var avatarMap={};
function getAvatarClass(n){if(!avatarMap[n])avatarMap[n]=avatarClasses[Object.keys(avatarMap).length%3];return avatarMap[n];}
function initials(n){if(!n)return'?';var c=n.replace(/<[^>]*>/g,'').trim();var p=c.split(/\s+/);return((p[0]||'')[0]+(p[1]?p[1][0]:'')).toUpperCase();}
function decodeQP(s){return s.replace(/=\r?\n/g,'').replace(/=([0-9A-Fa-f]{2})/g,function(_,h){return String.fromCharCode(parseInt(h,16));});}
function decodeB64(s){try{return atob(s.replace(/\s/g,''));}catch(e){return s;}}
function parseEML(text){
  var norm=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');var lines=norm.split('\n');
  var headers={};var i=0;
  while(i<lines.length&&lines[i].trim()!==''){
    if(/^\s/.test(lines[i])&&Object.keys(headers).length>0){var lk=Object.keys(headers).pop();headers[lk]+=' '+lines[i].trim();}
    else{var m=lines[i].match(/^([^:]+):\s*(.*)/);if(m)headers[m[1].toLowerCase().trim()]=m[2];}
    i++;
  }
  var bodyLines=lines.slice(i+1);var ct=headers['content-type']||'text/plain';var enc=(headers['content-transfer-encoding']||'').toLowerCase();var body='';
  if(ct.toLowerCase().includes('multipart')){
    var bm=ct.match(/boundary="?([^";\s]+)"?/i);
    if(bm){var bound='--'+bm[1];var full=bodyLines.join('\n');var parts=full.split(bound);
      for(var p=0;p<parts.length;p++){var part=parts[p];
        if(part.toLowerCase().includes('text/plain')||part.toLowerCase().includes('text/html')){
          var sl=part.split('\n');var si=0;
          while(si<sl.length&&sl[si].trim()!=='')si++;
          var se=(part.match(/content-transfer-encoding:\s*(\S+)/i)||[])[1]||'';
          var rb=sl.slice(si+1).join('\n').split(/\n--/)[0];
          if(se.toLowerCase().includes('quoted-printable'))body=decodeQP(rb);
          else if(se.toLowerCase().includes('base64'))body=decodeB64(rb);
          else body=rb;
          if(part.toLowerCase().includes('text/plain'))break;
        }
      }
    }
  } else {
    var raw=bodyLines.join('\n');
    if(enc.includes('quoted-printable'))body=decodeQP(raw);
    else if(enc.includes('base64'))body=decodeB64(raw);
    else body=raw;
  }
  body=body.replace(/<style[^>]*>[\s\S]*?<\/style>/gi,'').replace(/<script[^>]*>[\s\S]*?<\/script>/gi,'')
    .replace(/<[^>]+>/g,' ').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
    .replace(/&nbsp;/g,' ').replace(/&#160;/g,' ').replace(/[ \t]{2,}/g,' ').replace(/\n{3,}/g,'\n\n').trim();
  var fr=headers['from']||'Unknown';
  var fnm=fr.match(/^"?([^"<]+)"?\s*<.*>$/)||fr.match(/^([^@]+@[^\s]+)$/);
  var fromName=(fnm?fnm[1]:fr).trim();
  var fem=fr.match(/<([^>]+)>/);var fromEmail=fem?fem[1]:fr;
  var threadTopic=headers['thread-topic']||headers['subject']||'(no subject)';
  var subject=headers['subject']||'(no subject)';
  var dr=headers['date']||'';var date=dr?new Date(dr):new Date(0);
  return{fromName:fromName,fromEmail:fromEmail,subject:subject,threadTopic:threadTopic,date:date,body:body};
}
function handleFiles(files){
  var arr=Array.prototype.slice.call(files);
  var promises=arr.map(function(f){return f.text().then(function(t){try{return parseEML(t);}catch(e){return null;}});});
  Promise.all(promises).then(function(msgs){
    msgs.filter(Boolean).forEach(function(m){allMessages.push(m);});
    allMessages.sort(function(a,b){return a.date-b.date;});
    buildThreads();renderSidebar();
    if(allMessages.length>0){document.getElementById('emptyState').style.display='none';if(!activeThread)selectThread(Object.keys(threads)[0]);}
  });
}
function buildThreads(){threads={};allMessages.forEach(function(m){if(!threads[m.threadTopic])threads[m.threadTopic]=[];threads[m.threadTopic].push(m);});}
function renderSidebar(){
  var list=document.getElementById('threadList');var keys=Object.keys(threads);
  if(!keys.length){list.innerHTML='<div style="padding:16px 14px;font-size:12px;color:var(--text-tertiary)">No files loaded yet</div>';return;}
  list.innerHTML=keys.map(function(k){
    var msgs=threads[k];var last=msgs[msgs.length-1];
    var ds=last.date>new Date(0)?last.date.toLocaleDateString('en-US',{month:'short',day:'numeric'}):'';
    var filtered=searchQuery?msgs.filter(msgMatchesSearch):msgs;var ia=k===activeThread;
    return'<div class="thread-item'+(ia?' active':'')+'" onclick="selectThread('+JSON.stringify(k)+')">'+
      '<div style="display:flex;justify-content:space-between;align-items:center">'+
        '<div class="thread-name">'+esc(k)+'</div>'+
        (searchQuery&&filtered.length?'<span class="badge">'+filtered.length+'</span>':'')+
      '</div>'+
      '<div class="thread-meta">'+(ds?ds+' &bull; ':'')+msgs.length+' msg'+(msgs.length!==1?'s':'')+'</div>'+
    '</div>';
  }).join('');
}
function selectThread(k){activeThread=k;renderSidebar();renderMessages();}
function msgMatchesSearch(m){if(!searchQuery)return true;var q=searchQuery.toLowerCase();return m.body.toLowerCase().includes(q)||m.fromName.toLowerCase().includes(q)||m.subject.toLowerCase().includes(q);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function highlightText(text,query){if(!query)return esc(text);var re=new RegExp('('+query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');return esc(text).replace(re,'<mark>$1</mark>');}
function renderMessages(){
  var area=document.getElementById('chatArea');var msgs=threads[activeThread]||[];
  var filtered=searchQuery?msgs.filter(msgMatchesSearch):msgs;
  var participants=[...new Set(msgs.map(function(m){return m.fromName;}))];
  var header='<div class="chat-header"><div class="chat-header-name">'+esc(activeThread)+'</div><div class="chat-header-count">'+filtered.length+' message'+(filtered.length!==1?'s':'')+'</div></div>'+
    '<div class="stats-bar"><span><b>'+msgs.length+'</b> total</span><span><b>'+participants.length+'</b> participant'+(participants.length!==1?'s':'')+'</span>'+
    (msgs[0]&&msgs[0].date>new Date(0)?'<span>'+msgs[0].date.toLocaleDateString()+' to '+msgs[msgs.length-1].date.toLocaleDateString()+'</span>':'')+
    '</div>';
  var items=filtered.map(function(m){
    var col=getAvatarClass(m.fromName);
    var ts=m.date>new Date(0)?m.date.toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';
    var bh=searchQuery?highlightText(m.body,searchQuery):esc(m.body);
    return'<div class="msg-group"><div class="avatar avatar-'+col+'">'+initials(m.fromName)+'</div>'+
      '<div class="msg-content"><div class="msg-header"><span class="msg-sender">'+esc(m.fromName)+'</span><span class="msg-time">'+ts+'</span></div>'+
      '<div class="msg-body">'+bh+'</div></div></div>';
  }).join('');
  area.innerHTML=header+'<div class="messages">'+(items||'<div class="no-results">No messages match your search.</div>')+'</div>';
}
function handleSearch(v){searchQuery=v;renderSidebar();if(activeThread)renderMessages();}
function exportData(fmt){
  if(!allMessages.length){alert('No messages loaded yet.');return;}
  var filename,content,type;
  if(fmt==='json'){
    content=JSON.stringify(allMessages.map(function(m){return{from:m.fromName,email:m.fromEmail,subject:m.subject,thread:m.threadTopic,date:m.date.toISOString(),body:m.body};}),null,2);
    filename='chat_export.json';type='application/json';
  } else {
    var rows=[['Thread','From','Email','Date','Subject','Body']];
    allMessages.forEach(function(m){rows.push([m.threadTopic,m.fromName,m.fromEmail,m.date.toISOString(),m.subject,m.body.replace(/\n/g,' ')].map(function(v){return'"'+String(v).replace(/"/g,'""')+'"';}));});
    content=rows.map(function(r){return r.join(',');}).join('\n');
    filename='chat_export.csv';type='text/csv';
  }
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type:type}));a.download=filename;a.click();
  setTimeout(function(){URL.revokeObjectURL(a.href);},1000);
}
</script>
</body>
</html>
